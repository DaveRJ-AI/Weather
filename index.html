          const feelsLike = computeFeelsLikeF(
            data?.current?.temperature_2m,
            data?.current?.relative_humidity_2m,
            data?.current?.wind_speed_10m
          );

          return {
            todayHigh,
            todayLow,
            todayCode,
            todayCondition,
            humidityHigh24,
            dewPointLow24,
            tenDay,
            maxHigh,
            minLow,
            hourlyForDay,
            nightSkyConditions,
            selectedDayData,
            daylightDuration,
            currentTemp: data?.current?.temperature_2m,
            currentHumidity: data?.current?.relative_humidity_2m,
            currentWind: data?.current?.wind_speed_10m,
            feelsLike,
          };
        }, [data, selectedDate]);

        // background mode update
        useEffect(() => {
          if (!derived?.tenDay?.length) return;
          setBgMode(
            computeBgMode({
              nowUtcMillis: Date.now(),
              sunriseLocalIso: derived.tenDay[0].sunrise,
              sunsetLocalIso: derived.tenDay[0].sunset,
              utcOffsetSeconds,
            })
          );
        }, [nowTick, utcOffsetSeconds, derived?.tenDay?.[0]?.sunrise, derived?.tenDay?.[0]?.sunset]);

        useEffect(() => {
          if (!place?.lat || !place?.lon || !selectedDate) return;
          try {
            setPlanets10pm(
              computeVisiblePlanetsAt10pmLocal({
                lat: place.lat,
                lon: place.lon,
                utcOffsetSeconds,
                dateISO: selectedDate,
                tzName,
              })
            );
          } catch (e) {
            console.warn("Planets calc failed", e);
          }

          try {
            setMoonRiseSet(
              computeMoonRiseSetForDate({
                lat: place.lat,
                lon: place.lon,
                utcOffsetSeconds,
                dateISO: selectedDate,
                tzName,
              }) ?? { rise: "—", set: "—" }
            );
          } catch {
            setMoonRiseSet({ rise: "—", set: "—" });
          }
        }, [place?.lat, place?.lon, selectedDate, utcOffsetSeconds, tzName]);

        // where to draw "now" line on chart (only when viewing today)
        const nowIndex = useMemo(() => {
          if (!derived?.hourlyForDay?.isoTimes?.length) return null;
          const todayIso = derived?.tenDay?.[0]?.date;
          if (!todayIso || derived.hourlyForDay.date !== todayIso) return null;

          const nowUtc = Date.now();
          let bestIdx = null;
          let bestAbs = Infinity;
          for (let i = 0; i < derived.hourlyForDay.isoTimes.length; i++) {
            const utcMillis = localIsoToUtcMillis(derived.hourlyForDay.isoTimes[i], utcOffsetSeconds);
            if (utcMillis == null) continue;
            const abs = Math.abs(utcMillis - nowUtc);
            if (abs < bestAbs) {
              bestAbs = abs;
              bestIdx = i;
            }
          }
          return bestIdx;
        }, [derived?.hourlyForDay?.date, derived?.hourlyForDay?.isoTimes?.length, utcOffsetSeconds, nowTick]);

        // Prev/Next day controls for hourly chart
        const canPrevNext = useMemo(() => {
          const days = derived?.tenDay?.map((d) => d.date) ?? [];
          const idx = days.indexOf(selectedDate);
          return { days, idx };
        }, [derived?.tenDay, selectedDate]);

        function goPrevDay() {
          const { days, idx } = canPrevNext;
          if (idx > 0) setSelectedDate(days[idx - 1]);
        }
        function goNextDay() {
          const { days, idx } = canPrevNext;
          if (idx >= 0 && idx < days.length - 1) setSelectedDate(days[idx + 1]);
        }

        function selectForecastDate(date) {
          setSelectedDate(date);
          setExpandedForecastDate((current) => (current === date ? null : date));
        }

        function scrollToSection(ref) {
          ref?.current?.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        const expandedHourlyRows = useMemo(() => {
          if (!expandedForecastDate || !data?.hourly?.time?.length) return [];

          const times = data.hourly.time ?? [];
          const temps = data.hourly.temperature_2m ?? [];
          const precip = data.hourly.precipitation_probability ?? [];
          const wind = data.hourly.wind_speed_10m ?? [];
          const codes = data.hourly.weathercode ?? [];
          const todayIso = derived?.tenDay?.[0]?.date;
          const trimPastHours = expandedForecastDate === todayIso;
          const nowUtc = Date.now();

          const rows = [];
          for (let i = 0; i < times.length; i++) {
            if (!String(times[i]).startsWith(expandedForecastDate)) continue;
            if (trimPastHours) {
              const utcMillis = localIsoToUtcMillis(times[i], utcOffsetSeconds);
              if (Number.isFinite(utcMillis) && utcMillis < nowUtc - 60 * 60 * 1000) continue;
            }
            rows.push({
              time: formatHourLabel(times[i]),
              temp: temps[i],
              precip: precip[i],
              wind: wind[i],
              code: codes[i],
            });
          }
          return rows;
        }, [expandedForecastDate, data, derived?.tenDay?.[0]?.date, utcOffsetSeconds, nowTick]);

        const sunArc = useMemo(() => {
          if (!derived?.selectedDayData) return null;
          return computeSunArcInfo({
            dateISO: derived.selectedDayData.date,
            sunriseLocalIso: derived.selectedDayData.sunrise,
            sunsetLocalIso: derived.selectedDayData.sunset,
            utcOffsetSeconds,
          });
        }, [derived?.selectedDayData?.date, derived?.selectedDayData?.sunrise, derived?.selectedDayData?.sunset, utcOffsetSeconds, nowTick]);

        const isDarkUI = bgMode !== "day";
        const bgClass =
          bgMode === "night"
            ? "bg-black text-white"
            : bgMode === "twilight"
            ? "bg-[#0B1B3A] text-white"
            : "bg-[#CFE9FF] text-slate-900";
        const cardBg = isDarkUI ? "bg-white/5 backdrop-blur" : "bg-white/80 backdrop-blur";
        const borderSoft = isDarkUI ? "border-white/10" : "border-black/5";
        const cardText = isDarkUI ? "text-slate-100" : "text-slate-900";
        const subText = isDarkUI ? "text-slate-300" : "text-slate-600";
        const chartTitleDate = derived?.hourlyForDay?.date ? formatDateLabel(derived.hourlyForDay.date) : "—";

        // Favorites label (for dropdown selection)
        const tzDisplay = prettyTimezoneName(tzName);

        const comparableFavorites = useMemo(() => {
          return favorites.filter((f) => {
            if (!f?.mode) return false;
            if (f.mode === "zip") return !!f.zip;
            if (f.mode === "geo") {
              return Number.isFinite(Number(f.lat)) && Number.isFinite(Number(f.lon));

          });
        }, [favorites]);

        // ---------- Favorites comparison fetch ----------
        async function refreshFavoritesNow() {
          const requestId = favoritesNowRequestRef.current + 1;
          favoritesNowRequestRef.current = requestId;

          try {
            if (!favoritesLoaded) return;

            if (!comparableFavorites.length) {
              setFavoritesNow({});
              return;
            }

            // fetch for each favorite using either ZIP lookup or saved geo coordinates
            const pairs = await mapWithConcurrency(comparableFavorites, 2, async (fav) => {
              const key = makeFavoriteKey(fav);
              try {
                let coords;
                if (fav.mode === "zip") {
                  coords = await lookupZipToCoords(fav.zip);
                } else {
                  coords = {
                    lat: Number(fav.lat),
                    lon: Number(fav.lon),
                    city: fav.city || "—",
                    state: fav.state || "",
                  };
                }
                const params = new URLSearchParams({
                  latitude: String(coords.lat),
                  longitude: String(coords.lon),
                  timezone: "auto",
                  temperature_unit: "fahrenheit",
                  wind_speed_unit: "mph",
                  current: "temperature_2m,relative_humidity_2m",
                });
                const wx = await fetchWeatherForecast(params, "Favorite comparison weather");
                const off = Number(wx?.utc_offset_seconds ?? 0);
                const safeOff = Number.isFinite(off) ? off : 0;
                return [
                  key,
                  {
                    key,
                    zip: fav.mode === "zip" ? fav.zip : "",
                    label: fav.label || favoriteDisplayLabel(fav),
                    city: coords.city,
                    state: coords.state,
                    temp: wx?.current?.temperature_2m ?? null,
                    humidity: wx?.current?.relative_humidity_2m ?? null,
                    tz: wx?.timezone ?? "auto",
                    offset: safeOff,
                    localTime: localTimeFromOffset(safeOff),
                  },
                ];
              } catch {
                return [
                  key,
                  {
                    key,
                    zip: fav.mode === "zip" ? fav.zip : "",
                    label: fav.label || favoriteDisplayLabel(fav),
                    city: "—",
                    state: "",
                    temp: null,
                    humidity: null,
                    tz: "auto",
                    offset: 0,
                    localTime: "—",
                  },
                ];
              }
            });

            if (favoritesNowRequestRef.current !== requestId) return;
            const next = {};
            for (const [z, obj] of pairs) next[z] = obj;
            setFavoritesNow(next);
          } catch (e) {
            console.warn("favorites compare failed", e);
          }
        }

        // refresh favorites now when main location changes (and occasionally)
        useEffect(() => {
          if (!favoritesLoaded) return;
          refreshFavoritesNow();
        }, [favoritesLoaded, favorites, place?.lat, place?.lon]);

        useEffect(() => {
          if (!favoritesLoaded) return;
          const id = setInterval(() => refreshFavoritesNow(), 10 * 60 * 1000);
          return () => clearInterval(id);
        }, [favoritesLoaded, favorites]);

        // Comparison model vs current active location
        const nightSkyAssessment = useMemo(() => {
          return getStarViewingAssessment({
            moonIllumination: moon?.illumination,

        }, [

        ]);

        const compareRows = useMemo(() => {
          const baseTemp = derived?.currentTemp;
          const baseHum = derived?.currentHumidity;

          if (!favoritesNow || !Object.keys(favoritesNow).length) return [];

          return comparableFavorites
            .map((fav) => makeFavoriteKey(fav))
            .filter((key) => key && key !== selectedFavoriteKey)
            .map((key) => {
              const other = favoritesNow[key];
              const dt = Number(other?.temp) - Number(baseTemp);
              const dh = Number(other?.humidity) - Number(baseHum);
              const dmins = ((Number(other?.offset) || 0) - (Number(baseOff) || 0)) / 60;

              const safeDt = Number.isFinite(dt) ? dt : null;
              const safeDh = Number.isFinite(dh) ? dh : null;
              const safeDmins = Number.isFinite(dmins) ? dmins : null;

              return {
                key,
                zip: other?.zip ?? "",
                label: other?.label ?? key,
                city: other?.city ?? "",
                state: other?.state ?? "",
                otherTemp: other?.temp ?? null,
                otherHum: other?.humidity ?? null,
                otherTime: other?.localTime ?? "—",
                dTemp: safeDt,
                dHum: safeDh,
                dMins: safeDmins,
              };

        }, [comparableFavorites, favoritesNow, derived?.currentTemp, derived?.currentHumidity, utcOffsetSeconds, selectedFavoriteKey]);

        const comparisonEmptyMessage = useMemo(() => {
          const comparableCount = comparableFavorites.length;

          if (loading) return "Comparison will appear after current conditions load.";
          if (!favoritesLoaded) return "Loading saved favorites...";
          if (comparableCount === 0) return "Add a favorite to compare current conditions.";
          if (comparableCount === 1 && makeFavoriteKey(comparableFavorites[0]) === selectedFavoriteKey) {
            return "Add another favorite to compare against the current location.";
          }
          if (!Object.keys(favoritesNow || {}).length) return "Refreshing comparison data...";
          return "No comparison rows are available for the current favorite selection.";
        }, [loading, favoritesLoaded, comparableFavorites, selectedFavoriteKey, favoritesNow]);

        function diffClass(val) {
          if (val === null || val === undefined || !Number.isFinite(Number(val))) return "";
          return Number(val) < 0 ? "text-sky-500" : Number(val) > 0 ? "text-rose-500" : "";
        }

        function formatDiff(val, unit) {
          if (val === null || val === undefined || !Number.isFinite(Number(val))) return "—";
          const n = Number(val);

          const abs = Math.abs(n);

            const m = mins % 60;

            return `${sign}${h}h ${m}m`;
          }
          return `${sign}${abs}`;
        }

	                              <td className="px-3 py-3 text-sm">{formatPct(d.precipProb)}</td>
	                              <td className="px-3 py-3 text-sm">{formatInches(d.precip)}</td>
	                              <td className="px-3 py-3 text-sm">{formatMph(d.windMax)}</td>
	                            </tr>
	                            {isExpanded ? (
	                              <tr>
	                                <td colSpan="9" className="px-0 pb-2">
	                                  <div
	                                    role="button"
	                                    tabIndex="0"
	                                    onClick={() => setExpandedForecastDate(null)}
	                                    onKeyDown={(e) => {
	                                      if (e.key === "Enter" || e.key === " ") setExpandedForecastDate(null);
	                                    }}
	                                    className={`cursor-pointer rounded-2xl p-4 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-white/80 ring-black/5"}`}
	                                    title="Click hourly forecast to collapse"
	                                  >
	                                    <div className={`mb-3 text-xs font-semibold uppercase tracking-wide ${subText}`}>
	                                      Hourly forecast • {formatDateLabel(d.date)}
	                                    </div>
	                                    {rows.length ? (
	                                      <div className={`overflow-hidden rounded-2xl ring-1 ${isDarkUI ? "bg-black/15 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
	                                        <div className={`grid grid-cols-[1fr_0.5fr_1fr_1fr_1fr] gap-3 px-4 py-2 text-[11px] font-semibold uppercase tracking-wide ${subText}`}>
	                                          <div>Hour</div>
	                                          <div className="text-center">Sky</div>
	                                          <div className="text-right">Temp</div>
	                                          <div className="text-right">PoP</div>
	                                          <div className="text-right">Wind</div>
	                                        </div>
	                                        {rows.map((row, rowIdx) => (
	                                          <div
	                                            key={`${d.date}:desktop:${rowIdx}`}
	                                            className={`grid grid-cols-[1fr_0.5fr_1fr_1fr_1fr] gap-3 px-4 py-2.5 text-sm ${
	                                              rowIdx > 0 ? (isDarkUI ? "border-t border-white/10" : "border-t border-black/5") : ""
	                                            }`}
	                                          >
	                                            <div className="font-semibold">{row.time}</div>
	                                            <div className="text-center text-lg leading-none" title={weatherCondition(row.code, row.temp).label}>{weatherCondition(row.code, row.temp).icon}</div>
	                                            <div className="text-right">{formatTemp(row.temp)}</div>
	                                            <div className="text-right">{formatPct(row.precip)}</div>
	                                            <div className="text-right">{formatMph(row.wind)}</div>
	                                          </div>
	                                        ))}
	                                      </div>
	                                    ) : (
	                                      <div className={`text-sm ${subText}`}>No hourly data for this date.</div>
	                                    )}
	                                  </div>
	                                </td>
	                              </tr>
	                            ) : null}
	                          </React.Fragment>
	                        );
	                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Comparison section */}
              <div className={`mt-4 rounded-3xl border p-6 ${cardBg} ${borderSoft} shadow-[0_10px_30px_rgba(0,0,0,0.10)] ${cardText}`}>
                <div className="flex items-end justify-between">
                  <div>
                    <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Favorites comparison</div>
                    <div className={`mt-1 text-sm ${subText}`}>Differences vs current location</div>
                  </div>
                  <div className={`text-xs ${subText}`}>Blue = lower/earlier • Red = higher/later</div>
                </div>

                <div className="mt-4 flex sm:hidden">
                  <div className={`inline-flex rounded-2xl p-1 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-100 ring-black/5"}`}>
                    <button
                      type="button"
                      onClick={() => setMobileComparisonCompact(true)}
                      className={`rounded-xl px-3 py-1.5 text-xs font-semibold ${
                        mobileComparisonCompact
                          ? isDarkUI
                            ? "bg-white text-black"
                            : "bg-white text-slate-900 shadow"
                          : subText
                      }`}
                    >
                      Compact
                    </button>
                    <button
                      type="button"
                      onClick={() => setMobileComparisonCompact(false)}
                      className={`rounded-xl px-3 py-1.5 text-xs font-semibold ${
                        !mobileComparisonCompact
                          ? isDarkUI
                            ? "bg-white text-black"
                            : "bg-white text-slate-900 shadow"
                          : subText
                      }`}
                    >
                      Detailed
                    </button>
                  </div>
                </div>

                <div className="mt-4 space-y-3 sm:hidden">
                  {(compareRows?.length ?? 0) === 0 ? (
                    <div className={`rounded-3xl px-4 py-4 text-sm ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"} ${subText}`}>
                      {comparisonEmptyMessage}
                    </div>
                  ) : mobileComparisonCompact ? (
                    <div className={`overflow-hidden rounded-3xl ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                      {(compareRows ?? []).map((r, idx) => (
                        <div
                          key={r.key}
                          className={`px-4 py-3 ${idx > 0 ? (isDarkUI ? "border-t border-white/10" : "border-t border-black/5") : ""}`}
                        >
                          <div className="flex items-start justify-between gap-3">
                            <div className="min-w-0">
                              <div className="truncate text-sm font-semibold">{r.label}</div>
                              <div className={`mt-0.5 truncate text-xs ${subText}`}>
                                {r.city}{r.state ? `, ${r.state}` : ""}{r.zip ? ` (${r.zip})` : ""}
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="text-sm font-semibold">{formatTemp(r.otherTemp)}</div>
                              <div className={`text-xs font-semibold ${diffClass(r.dTemp)}`}>{formatDiff(r.dTemp, "temp")}</div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    (compareRows ?? []).map((r) => (
                      <div
                        key={r.key}
                        className={`rounded-3xl p-4 shadow-[0_10px_30px_rgba(0,0,0,0.08)] ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}
                      >
                        <div className="flex items-start justify-between gap-3">
                          <div>
                            <div className="text-base font-semibold">{r.label}</div>
                            <div className={`mt-1 text-sm ${subText}`}>
                              {r.city}{r.state ? `, ${r.state}` : ""}{r.zip ? ` (${r.zip})` : ""}
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-lg font-semibold">{formatTemp(r.otherTemp)}</div>
                            <div className={`text-xs ${subText}`}>Now</div>
                          </div>
                        </div>

                        <div className="mt-4 grid grid-cols-2 gap-x-4 gap-y-3">
                          <div>
                            <div className={`text-[11px] font-semibold uppercase tracking-wide ${subText}`}>Delta Temp</div>
                            <div className={`mt-1 text-base font-semibold ${diffClass(r.dTemp)}`}>{formatDiff(r.dTemp, "temp")}</div>
                          </div>
                          <div>
                            <div className={`text-[11px] font-semibold uppercase tracking-wide ${subText}`}>Humidity</div>
                            <div className="mt-1 text-base font-semibold">{formatPct(r.otherHum)}</div>
                          </div>
                          <div>
                            <div className={`text-[11px] font-semibold uppercase tracking-wide ${subText}`}>Delta Humidity</div>
                            <div className={`mt-1 text-base font-semibold ${diffClass(r.dHum)}`}>{formatDiff(r.dHum, "pct")}</div>
                          </div>
                          <div>
                            <div className={`text-[11px] font-semibold uppercase tracking-wide ${subText}`}>Local time</div>
                            <div className="mt-1 text-base font-semibold">{r.otherTime ?? "—"}</div>
                          </div>
                        </div>

                        <div className={`mt-4 text-sm ${subText}`}>
                          Delta time <span className={`ml-1 font-semibold ${diffClass(r.dMins)}`}>{formatDiff(r.dMins, "time")}</span>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                <div className="mt-2 hidden overflow-x-auto pb-2 sm:block">
                  <table className="w-full min-w-[920px] border-separate border-spacing-y-2">
                    <thead>
                      <tr className={`text-left text-xs ${subText}`}>
                        <th className="px-3 py-2">Favorite</th>
                        <th className="px-3 py-2">Now</th>
                        <th className="px-3 py-2">Δ Temp</th>
                        <th className="px-3 py-2">Humidity</th>
                        <th className="px-3 py-2">Δ Humidity</th>
                        <th className="px-3 py-2">Local time</th>
                        <th className="px-3 py-2">Δ Time</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(compareRows ?? []).map((r) => {
                        return (
                          <tr
                            key={r.key}
                            className={`rounded-2xl ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}
                          >
                            <td className="px-3 py-3 text-sm font-semibold">
                              {r.label}{" "}
                              <span className={`ml-2 text-xs ${subText}`}>
                                {r.city}{r.state ? `, ${r.state}` : ""}{r.zip ? ` (${r.zip})` : ""}
                              </span>
                            </td>
                            <td className="px-3 py-3 text-sm font-semibold">{formatTemp(r.otherTemp)}</td>
                            <td className={`px-3 py-3 text-sm font-semibold ${diffClass(r.dTemp)}`}>
                              {formatDiff(r.dTemp, "temp")}
                            </td>
                            <td className="px-3 py-3 text-sm">{formatPct(r.otherHum)}</td>
                            <td className={`px-3 py-3 text-sm font-semibold ${diffClass(r.dHum)}`}>
                              {formatDiff(r.dHum, "pct")}
                            </td>
                            <td className="px-3 py-3 text-sm font-semibold">{r.otherTime ?? "—"}</td>
                            <td className={`px-3 py-3 text-sm font-semibold ${diffClass(r.dMins)}`}>
                              {formatDiff(r.dMins, "time")}
                            </td>
                          </tr>
                        );
                      })}
                      {(compareRows?.length ?? 0) === 0 ? (
                        <tr>
                          <td className={`px-3 py-4 text-sm ${subText}`} colSpan={7}>
                            {comparisonEmptyMessage}
                          </td>
                        </tr>
                      ) : null}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className={`mt-4 rounded-3xl border p-6 lg:hidden ${cardBg} ${borderSoft} shadow-[0_10px_30px_rgba(0,0,0,0.10)] ${cardText}`}>
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <div className={`text-sm font-semibold tracking-wide ${subText}`}>Astronomy</div>
                    <div className="mt-1 text-lg font-semibold">{moon ? moon.name : "—"}</div>
                    <div className={`mt-1 text-sm ${subText}`}>{moon ? `Moon illumination: ${Math.round(moon.illumination * 100)}%` : ""}</div>
                  </div>
                  <div className="text-5xl" aria-label="Moon phase">{moon ? moon.icon : "🌙"}</div>
                </div>

                <div className="mt-4 grid grid-cols-2 gap-3">
                  <div className={`rounded-2xl p-3 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                    <div className={`text-xs ${subText}`}>Sunrise</div>
                    <div className="mt-1 text-sm font-semibold">{formatLocalIsoTime(derived?.selectedDayData?.sunrise)}</div>
                  </div>
                  <div className={`rounded-2xl p-3 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                    <div className={`text-xs ${subText}`}>Sunset</div>
                    <div className="mt-1 text-sm font-semibold">{formatLocalIsoTime(derived?.selectedDayData?.sunset)}</div>
                  </div>
                  <div className={`rounded-2xl p-3 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                    <div className={`text-xs ${subText}`}>Moonrise</div>
                    <div className="mt-1 text-sm font-semibold">{moonRiseSet?.rise ?? "—"}</div>
                  </div>
                  <div className={`rounded-2xl p-3 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                    <div className={`text-xs ${subText}`}>Moonset</div>
                    <div className="mt-1 text-sm font-semibold">{moonRiseSet?.set ?? "—"}</div>
                  </div>
                </div>

                <div className={`mt-4 rounded-2xl p-4 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                  <div className="flex items-center justify-between gap-3">
                    <div>
                      <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Sun path</div>
                      <div className={`mt-1 text-sm ${subText}`}>{sunArc?.status ?? "Sun position unavailable"}</div>
                    </div>
                    <div className="text-2xl" aria-hidden="true">☀️</div>
                  </div>

                  <div className="mt-3 grid grid-cols-2 gap-3">
                    <div className={`rounded-2xl p-3 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-white ring-black/5"}`}>
                      <div className={`text-xs ${subText}`}>Daylight</div>
                      <div className="mt-1 text-sm font-semibold">{formatDurationMs(derived?.daylightDuration)}</div>
                    </div>
                    <div className={`rounded-2xl p-3 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-white ring-black/5"}`}>
                      <div className={`text-xs ${subText}`}>Selected Day</div>
                      <div className="mt-1 text-sm font-semibold">{selectedDate ? formatDateLabel(selectedDate) : "—"}</div>
                    </div>
                  </div>

                  <div className="mt-4 relative h-20 overflow-hidden">
                    <div className={`absolute bottom-0 left-0 right-0 h-px ${isDarkUI ? "bg-white/20" : "bg-slate-300"}`}></div>
                    <div className={`absolute bottom-0 left-1/2 h-14 w-[1px] -translate-x-1/2 ${isDarkUI ? "bg-white/10" : "bg-slate-300/70"}`}></div>
                    <div className={`absolute bottom-0 left-[8%] right-[8%] h-20 rounded-t-full border-x border-t ${isDarkUI ? "border-white/15" : "border-slate-300"}`}></div>
                    <div
                      className="absolute text-xl transition-all duration-700"
                      style={{
                        left: `calc(8% + ${(sunArc?.progress ?? 0) * 84}%)`,
                        bottom: `${sunArc?.isDaylight ? sunArc?.arcHeightPx ?? 0 : 0}px`,
                        transform: "translate(-50%, 45%)",
                        opacity: sunArc?.isDaylight ? 1 : 0.4,
                      }}
                    >
                      ☀️
                    </div>
                  </div>
                </div>

                <div className={`mt-4 rounded-2xl p-4 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Night sky</div>
                      <div className="mt-1 text-sm font-semibold">{nightSkyAssessment?.label ?? "—"}</div>
                    </div>
                    <div className={`text-sm font-semibold ${subText}`}>{nightSkyAssessment?.score ?? "—"}/100</div>
                  </div>

                  <div className="mt-4">
                    <div className="relative h-4 overflow-hidden rounded-full ring-1 ring-black/5">
                      <div
                        className="absolute inset-0"
                        style={{
                          background: "linear-gradient(90deg, #ef4444 0%, #f59e0b 45%, #84cc16 70%, #22c55e 100%)",
                          opacity: isDarkUI ? 0.9 : 0.85,
                        }}
                      />
                      <div
                        className={`absolute top-1/2 h-6 w-1.5 -translate-x-1/2 -translate-y-1/2 rounded-full shadow ${isDarkUI ? "bg-white" : "bg-slate-900"}`}
                        style={{ left: `${Math.max(0, Math.min(100, Number(nightSkyAssessment?.score ?? 0)))}%` }}
                      />
                    </div>
                    <div className={`mt-2 flex justify-between text-[11px] ${subText}`}>
                      <span>Poor</span>
                      <span>Fair</span>
                      <span>Good</span>
                      <span>Excellent</span>
                    </div>
                  </div>

                  <div className={`mt-3 text-sm ${subText}`}>{nightSkyAssessment?.detail ?? "Assessment unavailable"}</div>
                </div>

                <div className="mt-4 flex items-start justify-between gap-3">
                  <div>
                    <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Planets visible</div>
                    <div className={`mt-1 text-sm ${subText}`}>At 10:00 PM local time</div>
                  </div>
                  <div className={`text-xs ${subText} text-right`}>{planets10pm?.localLabel ?? ""}</div>
                </div>

                {!planets10pm ? (
                  <div className={`mt-4 text-sm ${subText}`}>Calculating planets…</div>
                ) : planets10pm?.error ? (
                  <div className={`mt-4 text-sm ${subText}`}>{planets10pm.error}</div>
                ) : (planets10pm.visible?.length ?? 0) === 0 ? (
                  <div className={`mt-4 text-sm ${subText}`}>No planets are above the horizon at 10:00 PM local time.</div>
                ) : (
                  <div className="mt-4 flex flex-col gap-2">
                    {planets10pm.visible.map((p) => (
                      <div
                        key={p.name}
                        className={`flex items-center justify-between gap-3 rounded-2xl px-3 py-2 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}
                        title={`${p.name} • Alt ${p.altitude.toFixed(1)}° • Mag ${p.magnitude === null ? "—" : p.magnitude.toFixed(1)}`}
                      >
                        <div className="flex items-center gap-3">
                          <div className="text-2xl" aria-label={`${p.name} icon`}>{planetIcon(p.name)}</div>
                          <div>
                            <div className="text-sm font-semibold">{p.name}</div>
                            <div className={`text-xs ${subText}`}>
                              Rise: <span className={`font-medium ${isDarkUI ? "text-slate-200" : "text-slate-700"}`}>{p.rise ?? "—"}</span>
                              <span className="mx-1">•</span>
                              Set: <span className={`font-medium ${isDarkUI ? "text-slate-200" : "text-slate-700"}`}>{p.set ?? "—"}</span>
                            </div>
                          </div>
                        </div>

                        <div className={`text-xs ${subText} text-right`}>Alt {p.altitude.toFixed(0)}°</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <RadarOverlay
                open={showRadar}
                onClose={() => setShowRadar(false)}
                lat={place?.lat}
                lon={place?.lon}
                locationName={locationTitle}
                isDarkUI={isDarkUI}
              />

              {/* Local server tip (hidden, kept for reference) */}
	              <div className="hidden">
	                If this doesn’t load when opened as file://, run:
	                <div>python3 -m http.server 8000</div>
	                Then open: http://localhost:8000/weather.html
	              </div>
	              </React.Fragment>
	              )}
	            </div>
          </div>
        );
      }
// comment
      ReactDOM.createRoot(document.getElementById("root")).render(<WeatherApp />);
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((err) => {
            console.warn("Service worker registration failed", err);
          });
        });
      }
    </script>
  </body>
</html>
