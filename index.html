    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const GEO_API = "https://geocoding-api.open-meteo.com/v1/search";
      const ZIP_API = "https://api.zippopotam.us/us/";
      const RAINVIEWER_MAX_ZOOM = 7;
      const WEATHER_FORECAST_CACHE_MS = 2 * 60 * 1000;
      const weatherForecastCache = new Map();
      const weatherForecastInFlight = new Map();
      const SUPABASE_URL = "https://ljzizslxqfhgnnfytbnh.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_sa3UMsBVVYvhXmMHHtrxxQ_h3pOa7lv";

      function formatTemp(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        return `${Math.round(Number(n))}°F`;
      }
      function formatPct(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        return `${Math.round(Number(n))}%`;
      }
      function formatInches(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        const v = Number(n);
        return `${v.toFixed(v >= 1 ? 1 : 2)} in`;
      }
      function formatMph(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        return `${Math.round(Number(n))} mph`;
      }

      // Desired format: "Sat, Feb 21 2026"
      function formatDateLabel(isoDate) {
        try {
          const d = new Date(`${isoDate}T12:00:00`);
          const s = new Intl.DateTimeFormat("en-US", {
            weekday: "short",
            month: "short",
            day: "numeric",
            year: "numeric",
          }).format(d);
          return s.replace(/, (\d{4})$/, " $1");
        } catch {
          return isoDate;
        }
      }

      function formatWeekdayLabel(isoDate) {
        try {
          const d = new Date(`${isoDate}T12:00:00`);
          return new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(d);
        } catch {
          return isoDate;
        }
      }

      function formatHourLabel(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleTimeString(undefined, { hour: "numeric" });
        } catch {
          return iso;
        }
      }

      function isLikelyZip(q) {
        return /^\d{5}$/.test(String(q ?? "").trim());
      }

      function nicePlaceLabel({ name, admin1, country_code }) {
        const parts = [name, admin1, country_code].filter(Boolean);
        return parts.join(", ");
      }

      function makeFavoriteKey(fav) {
        if (!fav || !fav.mode) return "";
        if (fav.mode === "zip") return `zip:${fav.zip}`;
        if (fav.mode === "geo") return `geo:${fav.lat}:${fav.lon}`;
        return `unknown:${fav.label || ""}`;
      }

      function favoriteDisplayLabel(fav) {
        if (!fav) return "";
        if (fav.label) return fav.label;
        if (fav.mode === "zip") return fav.zip || "ZIP";
        if (fav.mode === "geo") {
          return fav.city ? `${fav.city}${fav.state ? `, ${fav.state}` : ""}` : `Geo ${fav.lat},${fav.lon}`;
        }
        return "Favorite";
      }

      function favoriteClientId(fav) {
        const key = makeFavoriteKey(fav);
        return fav?.clientId || fav?.id || (key ? `favorite-${key}` : makeId("favorite"));
      }

      function normalizeFavorite(fav) {
        return {
          id: fav?.id || favoriteClientId(fav),
          clientId: fav?.clientId || fav?.id || favoriteClientId(fav),
          label: fav?.label || "",
          mode: fav?.mode,
          zip: fav?.zip || "",
          lat: fav?.lat ?? null,
          lon: fav?.lon ?? null,
          city: fav?.city || "",
          state: fav?.state || "",
          country: fav?.country || "",
        };
      }

      function cloudFavoriteToLocal(row) {
        return {
          id: row.client_id,
          clientId: row.client_id,
          label: row.label || "",
          mode: row.mode,
          zip: row.zip || "",
          lat: row.lat,
          lon: row.lon,
          city: row.city || "",
          state: row.state || "",
          country: row.country || "",
        };
      }

      function localFavoriteToCloud(fav, userId) {
        const normalized = normalizeFavorite(fav);
        return {
          user_id: userId,
          client_id: normalized.clientId,
          label: normalized.label || null,
          mode: normalized.mode,
          zip: normalized.mode === "zip" ? normalized.zip : null,
          lat: normalized.mode === "geo" ? Number(normalized.lat) : null,
          lon: normalized.mode === "geo" ? Number(normalized.lon) : null,
          city: normalized.city || null,
          state: normalized.state || null,
          country: normalized.country || null,
        };
      }

      function postgrestTextInList(values) {
        return `(${values.map((value) => `"${String(value).replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"`).join(",")})`;
      }

      async function readJsonResponse(response, label) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : null;
        } catch {
          if (!response.ok) throw new Error(`${label} is temporarily unavailable.`);
          throw new Error(`${label} returned non-JSON data.`);
        }
      }

      function shouldUseNetlifyWeatherProxy() {
        if (window.location.port === "8888") return true;
        return window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1";
      }

      async function fetchWeatherForecast(params, label = "Weather forecast") {
        const query = params.toString();
        const cached = weatherForecastCache.get(query);
        if (cached && Date.now() - cached.createdAt < WEATHER_FORECAST_CACHE_MS) return cached.data;
        if (weatherForecastInFlight.has(query)) return await weatherForecastInFlight.get(query);

        const request = (async () => {
          if (shouldUseNetlifyWeatherProxy()) {
            const proxied = await fetch(`/.netlify/functions/weather?${query}`);
            const proxiedJson = await readJsonResponse(proxied, label);
            if (!proxied.ok) throw new Error(proxiedJson?.error || `${label} failed (${proxied.status}).`);
            weatherForecastCache.set(query, { createdAt: Date.now(), data: proxiedJson });
            return proxiedJson;
          }

          const response = await fetch(`https://api.open-meteo.com/v1/forecast?${query}`);
          const json = await readJsonResponse(response, label);
          if (!response.ok) throw new Error(json?.reason || json?.error || `${label} failed (${response.status}).`);
          weatherForecastCache.set(query, { createdAt: Date.now(), data: json });
          return json;
        })();

        weatherForecastInFlight.set(query, request);
        try {
          return await request;
        } finally {
          weatherForecastInFlight.delete(query);
        }
      }

      async function mapWithConcurrency(items, limit, mapper) {
        const results = new Array(items.length);
        let nextIndex = 0;
        const workers = Array.from({ length: Math.min(limit, items.length) }, async () => {
          while (nextIndex < items.length) {
            const index = nextIndex;
            nextIndex += 1;
            results[index] = await mapper(items[index], index);
          }
        });
        await Promise.all(workers);
        return results;
      }

      function pollenLevelTone(level, isDarkUI) {
        const category = String(level?.category || level?.label || "").toLowerCase();
        if (category.includes("very high")) {
          return isDarkUI ? "bg-rose-500/20 text-rose-100 ring-rose-300/30" : "bg-rose-100 text-rose-900 ring-rose-200";
        }
        if (category.includes("high")) {
          return isDarkUI ? "bg-orange-500/20 text-orange-100 ring-orange-300/30" : "bg-orange-100 text-orange-900 ring-orange-200";
        }
        if (category.includes("moderate")) {
          return isDarkUI ? "bg-amber-500/20 text-amber-100 ring-amber-300/30" : "bg-amber-100 text-amber-900 ring-amber-200";
        }
        if (category.includes("low")) {
          return isDarkUI ? "bg-emerald-500/20 text-emerald-100 ring-emerald-300/30" : "bg-emerald-100 text-emerald-900 ring-emerald-200";
        }
        return isDarkUI ? "bg-white/10 text-slate-100 ring-white/15" : "bg-slate-100 text-slate-700 ring-slate-200";
      }

      function formatPollenLevel(level) {
        if (!level) return "—";
        const label = level.category || level.label || "Available";
        return Number.isFinite(Number(level.value)) ? `${label} ${Math.round(Number(level.value))}/5` : label;
      }

      function formatPollenScore(level) {
        return Number.isFinite(Number(level?.value)) ? String(Math.round(Number(level.value))) : "—";
      }

      function compactDayLabel(isoDate, index) {
        if (index === 0) return "Today";
        try {
          const d = new Date(`${isoDate}T12:00:00`);
          return new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(d);
        } catch {
          return isoDate || "—";
        }
      }

      function airQualityTone(index, isDarkUI) {
        const category = String(index?.category || "").toLowerCase();
        const aqi = Number(index?.aqi);
        if (category.includes("hazardous") || aqi >= 301) {
          return isDarkUI ? "bg-purple-500/20 text-purple-100 ring-purple-300/30" : "bg-purple-100 text-purple-950 ring-purple-200";
        }
        if (category.includes("very unhealthy") || aqi >= 201) {
          return isDarkUI ? "bg-rose-500/20 text-rose-100 ring-rose-300/30" : "bg-rose-100 text-rose-900 ring-rose-200";
        }
        if (category.includes("unhealthy") || aqi >= 151) {
          return isDarkUI ? "bg-orange-500/20 text-orange-100 ring-orange-300/30" : "bg-orange-100 text-orange-900 ring-orange-200";
        }
        if (category.includes("moderate") || aqi >= 51) {
          return isDarkUI ? "bg-amber-500/20 text-amber-100 ring-amber-300/30" : "bg-amber-100 text-amber-900 ring-amber-200";
        }
        if (category.includes("good") || category.includes("excellent") || (Number.isFinite(aqi) && aqi <= 50)) {
          return isDarkUI ? "bg-emerald-500/20 text-emerald-100 ring-emerald-300/30" : "bg-emerald-100 text-emerald-900 ring-emerald-200";
        }
        return isDarkUI ? "bg-white/10 text-slate-100 ring-white/15" : "bg-slate-100 text-slate-700 ring-slate-200";
      }

      function formatAirQuality(index) {
        if (!index) return "—";
        const category = String(index.category || "Available").replace(/\s*air quality\s*/i, "").trim();
        const value = index.aqiDisplay || (Number.isFinite(Number(index.aqi)) ? Math.round(Number(index.aqi)) : "");
        return value ? `${category} ${value}` : category;
      }

      const WEATHERHOP_TRIPS_STORAGE_KEY = "weatherhop-trips";
      const TRIP_FORECAST_CACHE_MS = 45 * 60 * 1000;
      const TRIP_TYPICAL_CACHE_MS = 14 * 24 * 60 * 60 * 1000;
      const TRIP_TYPICAL_YEARS = 10;

      function todayISODate() {
        return new Date().toISOString().slice(0, 10);
      }

      function makeId(prefix = "id") {
        if (window.crypto?.randomUUID) return `${prefix}-${window.crypto.randomUUID()}`;
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function addDaysISO(dateISO, days) {
        const date = new Date(`${dateISO}T12:00:00`);
        date.setDate(date.getDate() + days);
        return date.toISOString().slice(0, 10);
      }

      function dateRangeISO(startDate, endDate) {
        if (!startDate || !endDate || endDate < startDate) return [];
        const dates = [];
        let current = startDate;
        while (current <= endDate && dates.length < 45) {
          dates.push(current);
          current = addDaysISO(current, 1);
        }
        return dates;
      }

      function shortDateLabel(dateISO) {
        try {
          const date = new Date(`${dateISO}T12:00:00`);
          return new Intl.DateTimeFormat("en-US", { weekday: "short", month: "short", day: "numeric" }).format(date);
        } catch {
          return dateISO;
        }
      }

      function isUserAtLocationOnDate(location, date) {
        return !!location?.arrivalDate && !!location?.departureDate && date >= location.arrivalDate && date <= location.departureDate;
      }

      function tripStorageKey(scope = "local") {
        return scope && scope !== "local" ? `${WEATHERHOP_TRIPS_STORAGE_KEY}-${scope}` : WEATHERHOP_TRIPS_STORAGE_KEY;
      }

      function loadTrips(scope = "local") {
        try {
          const raw = localStorage.getItem(tripStorageKey(scope));
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveTrips(trips, scope = "local") {
        localStorage.setItem(tripStorageKey(scope), JSON.stringify(trips ?? []));
      }

      function createDefaultTrip() {
        const startDate = todayISODate();
        const endDate = addDaysISO(startDate, 4);
        const now = new Date().toISOString();
        return {
          id: makeId("trip"),
          name: "New Trip",
          startDate,
          endDate,
          locations: [],
          createdAt: now,
          updatedAt: now,
          notes: "",
        };
      }

      function normalizeTrip(trip) {
        const base = createDefaultTrip();
        return {
          ...base,
          ...trip,
          locations: Array.isArray(trip?.locations) ? trip.locations : [],
          updatedAt: new Date().toISOString(),
        };
      }

      function cloudTripToLocal(row, stops = []) {
        return normalizeTrip({
          id: row.client_id,
          name: row.name,
          startDate: row.start_date,
          endDate: row.end_date,
          notes: row.notes || "",
          createdAt: row.created_at,
          updatedAt: row.updated_at,
          locations: stops
            .filter((stop) => stop.trip_id === row.id)
            .sort((a, b) => Number(a.stop_order ?? 0) - Number(b.stop_order ?? 0))
            .map((stop) => ({
              id: stop.client_id,
              name: stop.name || stop.display_name,
              displayName: stop.display_name,
              latitude: stop.latitude,
              longitude: stop.longitude,
              arrivalDate: stop.arrival_date,
              departureDate: stop.departure_date,
              notes: stop.notes || "",
            })),
        });
      }

      function localTripToCloud(trip, userId) {
        const normalized = normalizeTrip(trip);
        return {
          user_id: userId,
          client_id: normalized.id,
          name: normalized.name || "New Trip",
          start_date: normalized.startDate,
          end_date: normalized.endDate,
          notes: normalized.notes || "",
        };
      }

      function localStopToCloud(location, tripRow, userId, stopOrder) {
        return {
          user_id: userId,
          trip_id: tripRow.id,
          client_id: location.id || makeId("trip-location"),
          stop_order: stopOrder,
          name: location.name || location.displayName || "",
          display_name: location.displayName || location.name || "Trip stop",
          latitude: Number(location.latitude),
          longitude: Number(location.longitude),
          arrival_date: location.arrivalDate,
          departure_date: location.departureDate,
          notes: location.notes || "",
        };
      }

      function tripForecastCacheKey(lat, lon) {
        return `weatherhop-trip-forecast-${Number(lat).toFixed(4)}-${Number(lon).toFixed(4)}`;
      }

      function tripTypicalCacheKey(lat, lon, monthDay) {
        return `weatherhop-trip-typical-${Number(lat).toFixed(4)}-${Number(lon).toFixed(4)}-${monthDay}`;
      }

      async function fetchTripForecast({ lat, lon }) {
        const cacheKey = tripForecastCacheKey(lat, lon);
        try {
          const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
          if (cached?.savedAt && Date.now() - cached.savedAt < TRIP_FORECAST_CACHE_MS && cached?.data) {
            return cached.data;
          }
        } catch {}

        const params = new URLSearchParams({
          latitude: String(lat),
          longitude: String(lon),
          timezone: "auto",
          temperature_unit: "fahrenheit",
          precipitation_unit: "inch",
          wind_speed_unit: "mph",
          forecast_days: "10",
          daily:
            "temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,windspeed_10m_max,weathercode",
        });
        const data = await fetchWeatherForecast(params, "Trip forecast");
        try {
          localStorage.setItem(cacheKey, JSON.stringify({ savedAt: Date.now(), data }));
        } catch {}
        return data;
      }

      function finiteAverage(values) {
        const nums = (values ?? []).map(Number).filter((value) => Number.isFinite(value));
        if (!nums.length) return null;
        return nums.reduce((sum, value) => sum + value, 0) / nums.length;
      }

      async function fetchTripTypicalWeather({ lat, lon, date }) {
        const monthDay = String(date ?? "").slice(5, 10);
        if (!monthDay || monthDay.length !== 5) return null;
        const cacheKey = tripTypicalCacheKey(lat, lon, monthDay);
        try {
          const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
          if (cached?.savedAt && Date.now() - cached.savedAt < TRIP_TYPICAL_CACHE_MS && cached?.data) return cached.data;
        } catch {}

        const currentYear = new Date().getFullYear();
        const years = Array.from({ length: TRIP_TYPICAL_YEARS }, (_, idx) => currentYear - 1 - idx);
        const samples = await Promise.all(
          years.map(async (year) => {
            const sampleDate = `${year}-${monthDay}`;
            const params = new URLSearchParams({
              latitude: String(lat),
              longitude: String(lon),
              timezone: "auto",
              temperature_unit: "fahrenheit",
              precipitation_unit: "inch",
              start_date: sampleDate,
              end_date: sampleDate,
              daily: "temperature_2m_max,temperature_2m_min,precipitation_sum",
            });
            const response = await fetch(`https://archive-api.open-meteo.com/v1/archive?${params.toString()}`);
            if (!response.ok) return null;
            const data = await readJsonResponse(response, "Historical average");
            return {
              highTemp: data?.daily?.temperature_2m_max?.[0],
              lowTemp: data?.daily?.temperature_2m_min?.[0],
              precipitation: data?.daily?.precipitation_sum?.[0],
            };
          })
        );
        const validSamples = samples.filter(Boolean);
        const precipValues = validSamples.map((sample) => Number(sample.precipitation)).filter((value) => Number.isFinite(value));
        const wetDays = precipValues.filter((value) => value >= 0.01).length;
        const typical = {
          monthDay,
          years: validSamples.length,
          highTemp: finiteAverage(validSamples.map((sample) => sample.highTemp)),
          lowTemp: finiteAverage(validSamples.map((sample) => sample.lowTemp)),
          avgPrecip: finiteAverage(precipValues),
          wetChance: precipValues.length ? (wetDays / precipValues.length) * 100 : null,
        };
        try {
          localStorage.setItem(cacheKey, JSON.stringify({ savedAt: Date.now(), data: typical }));
        } catch {}
        return typical;
      }

      function tripCellFromForecast({ forecast, typical, location, date }) {
        const daily = forecast?.daily;
        const idx = daily?.time?.findIndex((value) => value === date) ?? -1;
        const isUserThere = isUserAtLocationOnDate(location, date);
        if (idx >= 0) {
          const code = daily.weathercode?.[idx];
          const condition = weatherCondition(code, daily.temperature_2m_min?.[idx]);
          const precip = daily.precipitation_probability_max?.[idx];
          const wind = daily.windspeed_10m_max?.[idx];
          const high = daily.temperature_2m_max?.[idx];
          const low = daily.temperature_2m_min?.[idx];
          const risks = [];
          if (Number(precip) >= 50) risks.push("Rain");
          if (Number(high) >= 90) risks.push("Heat");
          if (Number(low) <= 40) risks.push("Cold");
          if (Number(wind) >= 25) risks.push("Wind");
          if ([95, 96, 99].includes(Number(code))) risks.push("Storm");
          return {
            date,
            isUserThere,
            status: "available",
            highTemp: high,

            0.22475541 * T * RH -
            0.00683783 * T * T -

            0.00122874 * T * T * RH +

      function computeSunArcInfo({ dateISO, sunriseLocalIso, sunsetLocalIso, utcOffsetSeconds }) {
        if (!dateISO || !sunriseLocalIso || !sunsetLocalIso) return null;

        const currentLocal = new Date(Date.now() + (Number(utcOffsetSeconds) || 0) * 1000);
        const hh = String(currentLocal.getUTCHours()).padStart(2, "0");
        const mm = String(currentLocal.getUTCMinutes()).padStart(2, "0");

        if (![probeUtc, sunriseUtc, sunsetUtc].every(Number.isFinite)) return null;

        const duration = Math.max(1, sunsetUtc - sunriseUtc);
        const progress = (probeUtc - sunriseUtc) / duration;
        const clamped = Math.max(0, Math.min(1, progress));

        const status = probeUtc < sunriseUtc ? "Sun not up yet" : probeUtc > sunsetUtc ? "Sun has set" : "Sun is up";

        const times = hourly?.time ?? [];
        const cloud = hourly?.cloud_cover ?? [];
        const precip = hourly?.precipitation_probability ?? [];
        const codes = hourly?.weathercode ?? [];
        const preferred = [];
        const fallback = [];

          const hour = hourFromLocalIso(times[i]);

          const row = {

            weatherCode: codes[i],

          if (hour >= 21 && hour <= 23) preferred.push(row);
          if (hour >= 20 && hour <= 23) fallback.push(row);
        }

        const rows = preferred.length ? preferred : fallback;
        return {
          cloudCover: averageFinite(rows.map((row) => row.cloudCover)),
          precipProbability: maxFinite(rows.map((row) => row.precipProbability)),
          weatherCodes: rows.map((row) => row.weatherCode).filter((code) => Number.isFinite(Number(code))),

        const code = Number(weatherCode);
        const codes = (weatherCodes?.length ? weatherCodes : [code]).map(Number).filter((value) => Number.isFinite(value));

        const blockingCodes = [45, 48, 53, 55, 56, 57, 63, 65, 66, 67, 73, 75, 77, 81, 82, 85, 86, 95, 96, 99];
        const cloudyCodes = [3];
        const partlyCodes = [1, 2, 51, 61, 71, 80];

        let score = 100;
        let skyText = "Clear skies";

        if (cloudPct !== null) {
          if (cloudPct >= 90) {
            score -= 78;
            skyText = `Overcast near 10 PM (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 75) {
            score -= 62;
            skyText = `Mostly cloudy near 10 PM (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 50) {
            score -= 42;
            skyText = `Clouds likely limit viewing (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 25) {
            score -= 22;
            skyText = `Patchy clouds near 10 PM (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 10) {
            score -= 10;
            skyText = `Mostly clear near 10 PM (${cloudPct}% cloud cover)`;

        } else if (codes.some((value) => blockingCodes.includes(value) || cloudyCodes.includes(value))) {

          skyText = "Clouds or precip likely";
        } else if (codes.some((value) => partlyCodes.includes(value))) {
          score -= 28;
          skyText = "Some cloud interference";

        if (precipPct !== null) {
          if (precipPct >= 50) score -= 35;
          else if (precipPct >= 25) score -= 24;
          else if (precipPct >= 10) score -= 14;
          else if (precipPct >= 5) score -= 7;
        }

        if (codes.some((value) => blockingCodes.includes(value))) {
          score -= 18;
        }

        if (illumPct !== null) {
          if (illumPct >= 90) score -= 18;
          else if (illumPct >= 70) score -= 13;
          else if (illumPct >= 40) score -= 8;
          else if (illumPct >= 20) score -= 4;
        }

        if (cloudPct >= 90) score = Math.min(score, 22);
        else if (cloudPct >= 75) score = Math.min(score, 38);
        if (precipPct >= 50) score = Math.min(score, 35);
        if (codes.some((value) => blockingCodes.includes(value))) score = Math.min(score, 42);

        score = Math.max(5, Math.min(95, score));

        let label = "Excellent";
        if (score < 35) label = "Poor";
        else if (score < 55) label = "Fair";
        else if (score < 75) label = "Good";

        const moonText = illumPct === null ? "Moonlight unknown" : illumPct >= 70 ? "Bright moonlight" : illumPct >= 35 ? "Moderate moonlight" : "Low moonlight";
        const precipText = precipPct === null ? null : precipPct >= 10 ? `${precipPct}% precip risk` : "Low precip risk";

      function RadarOverlay({ open, onClose, lat, lon, locationName, isDarkUI }) {
        const mapEl = useRef(null);
        const mapRef = useRef(null);
        const radarLayerRef = useRef(null);
        const timerRef = useRef(null);
        const [frames, setFrames] = useState([]);
        const [frameIdx, setFrameIdx] = useState(0);
        const [playing, setPlaying] = useState(false);
        const [radarError, setRadarError] = useState("");
        const [loadingRadar, setLoadingRadar] = useState(false);

        const currentFrame = frames[frameIdx] ?? null;

        useEffect(() => {
          if (!open) return;
          let cancelled = false;

          async function loadFrames() {
            setLoadingRadar(true);
            setRadarError("");
            try {
              const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
              if (!res.ok) throw new Error(`Radar feed failed (${res.status}).`);
              const json = await readJsonResponse(res, "Radar feed");
              const past = json?.radar?.past ?? [];
              const nextFrames = past.map((frame) => ({
                ...frame,
                tileUrl: `${json.host}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
              }));
              if (!nextFrames.length) throw new Error("No radar frames are available right now.");
              if (!cancelled) {
                setFrames(nextFrames);
                setFrameIdx(nextFrames.length - 1);
              }
            } catch (e) {
              if (!cancelled) setRadarError(e?.message ?? "Radar is unavailable right now.");
            } finally {
              if (!cancelled) setLoadingRadar(false);
            }
          }

          loadFrames();
          return () => {
            cancelled = true;
          };
        }, [open]);

        useEffect(() => {
          if (!open || !mapEl.current || !window.L || !Number.isFinite(Number(lat)) || !Number.isFinite(Number(lon))) return;

          const map = window.L.map(mapEl.current, {
            zoomControl: true,
            attributionControl: true,
            minZoom: 4,
            maxZoom: RAINVIEWER_MAX_ZOOM,
          }).setView([Number(lat), Number(lon)], RAINVIEWER_MAX_ZOOM);

          window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: RAINVIEWER_MAX_ZOOM,
            attribution: "&copy; OpenStreetMap",
          }).addTo(map);

          const frogPinIcon = window.L.divIcon({
            className: "weatherhop-radar-pin-shell",
            html: '<div class="weatherhop-radar-pin"><img src="./weatherhop_frog_favicon.png" alt="" /></div>',
            iconSize: [42, 52],
            iconAnchor: [21, 43],
          });

          window.L.marker([Number(lat), Number(lon)], {
            icon: frogPinIcon,
            title: locationName ? `WeatherHop radar for ${locationName}` : "WeatherHop radar location",
          }).addTo(map);
          mapRef.current = map;

          setTimeout(() => map.invalidateSize(), 80);

          return () => {
            if (radarLayerRef.current) {
              radarLayerRef.current.remove();
              radarLayerRef.current = null;
            }
            map.remove();
            mapRef.current = null;
          };
        }, [open, lat, lon]);

        useEffect(() => {
          if (!open || !mapRef.current || !currentFrame?.tileUrl || !window.L) return;
          if (radarLayerRef.current) radarLayerRef.current.remove();
          radarLayerRef.current = window.L.tileLayer(currentFrame.tileUrl, {
            opacity: 0.72,
            zIndex: 20,
            maxZoom: RAINVIEWER_MAX_ZOOM,
            maxNativeZoom: RAINVIEWER_MAX_ZOOM,
            attribution: "Radar: RainViewer",
          }).addTo(mapRef.current);
        }, [open, currentFrame?.tileUrl]);

        useEffect(() => {
          if (!open || !playing || frames.length <= 1) return;
          timerRef.current = setInterval(() => {
            setFrameIdx((idx) => (idx + 1) % frames.length);
          }, 700);
          return () => {
            if (timerRef.current) clearInterval(timerRef.current);
            timerRef.current = null;
          };
        }, [open, playing, frames.length]);

        useEffect(() => {
          if (!open) setPlaying(false);
        }, [open]);

        if (!open) return null;

        const frameTime = currentFrame?.time
          ? new Date(currentFrame.time * 1000).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })
          : "";

        return (
          <div className="fixed inset-0 z-[160] flex items-end justify-center bg-black/55 sm:items-center">
            <div
              className={`flex h-[72vh] max-h-[620px] w-full flex-col rounded-t-3xl border shadow-[0_25px_80px_rgba(0,0,0,0.35)] sm:h-[560px] sm:w-[min(860px,calc(100vw-32px))] sm:rounded-3xl ${
                isDarkUI ? "border-white/10 bg-slate-950 text-slate-100" : "border-black/10 bg-white text-slate-900"
              }`}
            >
              <div className="flex items-center justify-between gap-3 px-4 py-3 sm:px-5">
                <div className="flex min-w-0 items-center gap-3">
                  <RadarIcon className="h-5 w-5 shrink-0" />
                  <div className="min-w-0">
                    <div className="truncate text-sm font-semibold">{locationName || "Current radar"}</div>
                    <div className={`text-xs ${isDarkUI ? "text-slate-300" : "text-slate-500"}`}>
                      {loadingRadar ? "Loading radar..." : radarError || (frameTime ? `Observed ${frameTime}` : "Observed radar")}
                    </div>
                  </div>
                </div>
                <button
                  type="button"
                  onClick={onClose}
                  className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-xl ${
                    isDarkUI ? "bg-white/10 hover:bg-white/15" : "bg-slate-100 hover:bg-slate-200"
                  }`}
                  aria-label="Close radar"
                  title="Close radar"
                >
                  ×
                </button>
              </div>

              <div className="relative min-h-0 flex-1">
                <div ref={mapEl} className="h-full w-full"></div>
                {radarError ? (
                  <div className="absolute inset-x-4 top-4 rounded-2xl bg-red-50 px-4 py-3 text-sm text-red-800 shadow">
                    {radarError}
                  </div>
                ) : null}
              </div>

              <div className={`flex flex-wrap items-center gap-3 border-t px-4 py-3 sm:px-5 ${isDarkUI ? "border-white/10" : "border-black/10"}`}>
                <button
                  type="button"
                  onClick={() => setPlaying((v) => !v)}
                  disabled={frames.length <= 1}
                  className={`rounded-full px-4 py-2 text-sm font-semibold disabled:opacity-50 ${
                    isDarkUI ? "bg-white text-black" : "bg-slate-900 text-white"
                  }`}
                >
                  {playing ? "Pause" : "Play"}
                </button>
                <input
                  type="range"
                  min="0"
                  max={Math.max(0, frames.length - 1)}
                  value={frameIdx}
                  onChange={(e) => {
                    setPlaying(false);
                    setFrameIdx(Number(e.target.value));
                  }}
                  disabled={!frames.length}
                  className="min-w-[180px] flex-1"
                  aria-label="Radar timeline"
                />
                <a
                  href="https://www.rainviewer.com/"
                  target="_blank"
                  rel="noreferrer"
                  className={`text-xs ${isDarkUI ? "text-slate-300" : "text-slate-500"}`}
                >
                  RainViewer
                </a>
              </div>
            </div>
          </div>
        );
      }

      function HourlyLineChart({
        title,
        labels,
        values,
        chartTitleDate,
        isDarkUI,
        nowIndex,
        formatTooltip,
        nowLineColor,
        minY,
        maxY,

            chartRef.current.destroy();

          const axisColor = isDarkUI ? "rgba(226,232,240,0.85)" : "rgba(107,114,128,0.95)";
          const gridColor = isDarkUI ? "rgba(226,232,240,0.10)" : "rgba(17,24,39,0.06)";

          const effectiveNowLineColor = nowLineColor ?? (isDarkUI ? "rgba(56,189,248,0.85)" : "rgba(37,99,235,0.65)");

            },
            options: {
              responsive: true,
              maintainAspectRatio: false,

                title: {
                  display: true,
                  text: `${title} — ${chartTitleDate}`,
                  color: titleColor,
                  padding: { top: 6, bottom: 10 },

                  },
                },
              },
              scales: {

        return <canvas ref={canvasRef}></canvas>;
      }

      function TravelPlanner({ isDarkUI, cardBg, borderSoft, cardText, subText, cloudTrips = null, cloudTripsLoaded = false, onTripsChange = null, accountEmail = "", tripScope = "local" }) {
        const [trips, setTrips] = useState(() => loadTrips(tripScope));
        const [selectedTripId, setSelectedTripId] = useState(() => loadTrips(tripScope)[0]?.id ?? "");
        const [searchText, setSearchText] = useState("");
        const [searchResults, setSearchResults] = useState([]);
        const [searchLoading, setSearchLoading] = useState(false);
        const [forecastByLocation, setForecastByLocation] = useState({});
        const [typicalByLocationDate, setTypicalByLocationDate] = useState({});
        const [stopsCollapsed, setStopsCollapsed] = useState(() => loadTrips(tripScope).some((trip) => (trip.locations ?? []).length > 0));
        const searchTimerRef = useRef(null);
        const cloudTripsSnapshotRef = useRef(null);

        useEffect(() => {
          if (cloudTripsLoaded && Array.isArray(cloudTrips)) return;
          const scopedTrips = loadTrips(tripScope);
          setTrips(scopedTrips);
          setSelectedTripId(scopedTrips[0]?.id ?? "");
          setStopsCollapsed(scopedTrips.some((trip) => (trip.locations ?? []).length > 0));
          cloudTripsSnapshotRef.current = null;
        }, [tripScope]);

        useEffect(() => {
          if (!cloudTripsLoaded || !Array.isArray(cloudTrips)) return;
          const snapshot = JSON.stringify(cloudTrips);
          if (snapshot === cloudTripsSnapshotRef.current) return;
          cloudTripsSnapshotRef.current = snapshot;
          setTrips(cloudTrips);
          if (cloudTrips.length) setSelectedTripId((current) => (cloudTrips.some((trip) => trip.id === current) ? current : cloudTrips[0].id));
          else setSelectedTripId("");
        }, [cloudTripsLoaded, cloudTrips]);

        useEffect(() => {
          saveTrips(trips, tripScope);
          if (cloudTripsLoaded && onTripsChange) {
            const snapshot = JSON.stringify(trips);
            if (snapshot !== cloudTripsSnapshotRef.current) {
              cloudTripsSnapshotRef.current = snapshot;
              onTripsChange(trips);
            }
          }
          if (trips.length && !trips.some((trip) => trip.id === selectedTripId)) {
            setSelectedTripId(trips[0].id);
          }
          if (!trips.length) setSelectedTripId("");
        }, [trips, selectedTripId]);

        const selectedTrip = trips.find((trip) => trip.id === selectedTripId) ?? trips[0] ?? null;
        const tripDates = useMemo(
          () => dateRangeISO(selectedTrip?.startDate, selectedTrip?.endDate),
          [selectedTrip?.startDate, selectedTrip?.endDate]
        );

        useEffect(() => {
          if (selectedTrip?.id && (selectedTrip.locations ?? []).length > 0) setStopsCollapsed(true);
        }, [selectedTrip?.id]);

        function updateSelectedTrip(patchOrUpdater) {
          if (!selectedTrip) return;
          setTrips((prev) =>
            prev.map((trip) => {
              if (trip.id !== selectedTrip.id) return trip;
              const patch = typeof patchOrUpdater === "function" ? patchOrUpdater(trip) : patchOrUpdater;
              return normalizeTrip({ ...trip, ...patch });
            })
          );
        }

        function updateTripDates(field, value) {
          updateSelectedTrip((trip) => {
            let startDate = field === "startDate" ? value : trip.startDate;
            let endDate = field === "endDate" ? value : trip.endDate;
            if (startDate && endDate && startDate > endDate) {
              if (field === "startDate") endDate = startDate;
              else startDate = endDate;
            }
            const locations = (trip.locations ?? []).map((location) => {
              const arrivalDate = location.arrivalDate < startDate ? startDate : location.arrivalDate > endDate ? endDate : location.arrivalDate;
              const departureDate =
                location.departureDate < arrivalDate
                  ? arrivalDate
                  : location.departureDate > endDate
                  ? endDate
                  : location.departureDate;
              return { ...location, arrivalDate, departureDate };
            });
            return { startDate, endDate, locations };
          });
        }

        function createTrip() {
          const trip = createDefaultTrip();
          setTrips((prev) => [trip, ...prev]);
          setSelectedTripId(trip.id);
          setStopsCollapsed(false);
        }

        function duplicateTrip() {
          if (!selectedTrip) return;
          const now = new Date().toISOString();
          const copy = {
            ...selectedTrip,
            id: makeId("trip"),
            name: `${selectedTrip.name || "Trip"} Copy`,
            createdAt: now,
            updatedAt: now,
            locations: (selectedTrip.locations ?? []).map((location) => ({ ...location, id: makeId("trip-location") })),
          };
          setTrips((prev) => [copy, ...prev]);
          setSelectedTripId(copy.id);
          setStopsCollapsed(false);
        }

        function deleteTrip() {
          if (!selectedTrip) return;
          if (!window.confirm(`Delete ${selectedTrip.name || "this trip"}?`)) return;
          setTrips((prev) => prev.filter((trip) => trip.id !== selectedTrip.id));
        }

        useEffect(() => {
          const q = String(searchText ?? "").trim();
          if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
          if (!q) {
            setSearchResults([]);
            setSearchLoading(false);
            return;
          }

          setSearchLoading(true);
          searchTimerRef.current = setTimeout(async () => {
            try {
              const results = [];
              if (isLikelyZip(q)) results.push({ _type: "zip", zip: q, label: `ZIP ${q}` });
              const params = new URLSearchParams({ name: q, count: "6", language: "en", format: "json" });
              const res = await fetch(`${GEO_API}?${params.toString()}`);
              if (res.ok) {
                const json = await readJsonResponse(res, "Trip search");
                for (const place of json?.results ?? []) {
                  results.push({ ...place, _type: "geo", label: nicePlaceLabel(place) });
                }
              }
              setSearchResults(results.slice(0, 8));
            } catch {
              setSearchResults([]);
            } finally {
              setSearchLoading(false);
            }
          }, 300);

          return () => {
            if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
          };
        }, [searchText]);

        async function resolveTripSearchResult(result) {
          if (result?._type === "zip") {
            const zipRes = await fetch(`${ZIP_API}${result.zip}`);
            if (!zipRes.ok) throw new Error("ZIP lookup failed.");
            const json = await readJsonResponse(zipRes, "Trip ZIP lookup");
            const first = json?.places?.[0];
            const lat = Number(first?.latitude);
            const lon = Number(first?.longitude);
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("ZIP lookup returned invalid coordinates.");
            const displayName = `${first["place name"]}, ${first["state abbreviation"] ?? first.state ?? ""}`.replace(/, $/, "");
            return { displayName, name: displayName, latitude: lat, longitude: lon };
          }

          const lat = Number(result?.latitude);
          const lon = Number(result?.longitude);
          if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("Location is missing coordinates.");
          const displayName = nicePlaceLabel(result);
          return { displayName, name: result.name || displayName, latitude: lat, longitude: lon };
        }

        async function addTripLocation(result) {
          if (!selectedTrip || !result) return;
          try {
            const resolved = await resolveTripSearchResult(result);
            const existingLocations = selectedTrip.locations ?? [];
            const lastDeparture = existingLocations.length ? existingLocations[existingLocations.length - 1].departureDate : null;
            const arrivalDate =
              lastDeparture && lastDeparture >= selectedTrip.startDate && lastDeparture <= selectedTrip.endDate
                ? lastDeparture
                : selectedTrip.startDate;
            const location = {
              id: makeId("trip-location"),
              name: resolved.name,
              displayName: resolved.displayName,
              latitude: resolved.latitude,
              longitude: resolved.longitude,
              arrivalDate,
              departureDate: arrivalDate,
              notes: "",
            };
            updateSelectedTrip({ locations: [...(selectedTrip.locations ?? []), location] });
            setSearchText("");
            setSearchResults([]);
          } catch (e) {
            window.alert(e?.message ?? "Could not add that location.");
          }
        }

        function updateLocation(locationId, patch) {
          updateSelectedTrip((trip) => ({
            locations: (trip.locations ?? []).map((location) => {
              if (location.id !== locationId) return location;
              let next = { ...location, ...patch };
              if (next.arrivalDate < trip.startDate) next.arrivalDate = trip.startDate;
              if (next.arrivalDate > trip.endDate) next.arrivalDate = trip.endDate;
              if (next.departureDate < next.arrivalDate) next.departureDate = next.arrivalDate;
              if (next.departureDate > trip.endDate) next.departureDate = trip.endDate;
              return next;
            }),
          }));
        }

        function removeLocation(locationId) {
          updateSelectedTrip((trip) => ({
            locations: (trip.locations ?? []).filter((location) => location.id !== locationId),
          }));
        }

        useEffect(() => {
          if (!selectedTrip?.locations?.length) {
            setForecastByLocation({});
            return;
          }

          let cancelled = false;
          selectedTrip.locations.forEach((location) => {
            if (!Number.isFinite(Number(location.latitude)) || !Number.isFinite(Number(location.longitude))) return;
            setForecastByLocation((prev) => ({
              ...prev,
              [location.id]: prev[location.id]?.data ? prev[location.id] : { loading: true, error: "", data: null },
            }));
            fetchTripForecast({ lat: location.latitude, lon: location.longitude })
              .then((data) => {
                if (!cancelled) {
                  setForecastByLocation((prev) => ({ ...prev, [location.id]: { loading: false, error: "", data } }));
                }
              })
              .catch((e) => {
                if (!cancelled) {
                  setForecastByLocation((prev) => ({
                    ...prev,
                    [location.id]: { loading: false, error: e?.message ?? "Forecast unavailable", data: null },
                  }));
                }
              });
          });

          return () => {
            cancelled = true;
          };
        }, [selectedTrip?.id, selectedTrip?.locations?.map((location) => `${location.id}:${location.latitude}:${location.longitude}`).join("|")]);

        useEffect(() => {
          if (!selectedTrip?.locations?.length || !tripDates.length) {
            setTypicalByLocationDate({});
            return;
          }

          let cancelled = false;
          selectedTrip.locations.forEach((location) => {
            const forecast = forecastByLocation[location.id]?.data;
            const forecastDates = forecast?.daily?.time ?? [];
            const maxForecastDate = forecastDates.length ? forecastDates[forecastDates.length - 1] : null;
            if (!maxForecastDate) return;

            tripDates.forEach((date) => {
              if (date <= maxForecastDate) return;
              const key = `${location.id}:${date}`;
              if (typicalByLocationDate[key]?.data || typicalByLocationDate[key]?.loading) return;
              setTypicalByLocationDate((prev) => ({ ...prev, [key]: { loading: true, error: "", data: null } }));
              fetchTripTypicalWeather({ lat: location.latitude, lon: location.longitude, date })
                .then((data) => {
                  if (!cancelled) setTypicalByLocationDate((prev) => ({ ...prev, [key]: { loading: false, error: "", data } }));
                })
                .catch((e) => {
                  if (!cancelled) {
                    setTypicalByLocationDate((prev) => ({
                      ...prev,
                      [key]: { loading: false, error: e?.message ?? "Typical weather unavailable", data: null },
                    }));
                  }
                });
            });
          });

          return () => {
            cancelled = true;
          };
        }, [
          selectedTrip?.id,
          selectedTrip?.locations?.map((location) => `${location.id}:${location.latitude}:${location.longitude}`).join("|"),
          tripDates.join(","),
          Object.entries(forecastByLocation)
            .map(([key, value]) => `${key}:${value?.data?.daily?.time?.slice(-1)[0] ?? value?.loading ?? ""}`)
            .join("|"),
        ]);

        const tripSummary = useMemo(() => {
          if (!selectedTrip?.locations?.length || !tripDates.length) return [];
          const availableHereCells = [];
          for (const location of selectedTrip.locations) {
            const forecast = forecastByLocation[location.id]?.data;
            for (const date of tripDates) {
              const typical = typicalByLocationDate[`${location.id}:${date}`]?.data;
              const cell = tripCellFromForecast({ forecast, typical, location, date });
              if (cell.isUserThere && cell.status === "available") availableHereCells.push({ location, cell });
            }
          }

          const notes = [];
          const rainy = availableHereCells.filter(({ cell }) => Number(cell.precipitationChance) >= 50);
          const stormy = availableHereCells.filter(({ cell }) => String(cell.riskSummary || "").includes("Storm"));
          const windy = availableHereCells.filter(({ cell }) => Number(cell.windSpeed) >= 25);
          const hottest = availableHereCells.reduce((best, item) => (Number(item.cell.highTemp) > Number(best?.cell?.highTemp ?? -999) ? item : best), null);
          const coldest = availableHereCells.reduce((best, item) => (Number(item.cell.lowTemp) < Number(best?.cell?.lowTemp ?? 999) ? item : best), null);

          if (rainy[0]) notes.push({ type: "rain", text: `Rain risk: ${rainy[0].location.displayName} on ${shortDateLabel(rainy[0].cell.date)} (${formatPct(rainy[0].cell.precipitationChance)}).` });
          if (stormy[0]) notes.push({ type: "storm", text: `Storm risk: ${stormy[0].location.displayName} on ${shortDateLabel(stormy[0].cell.date)}.` });
          if (hottest?.cell) notes.push({ type: "hot", text: `Warmest scheduled day: ${hottest.location.displayName}, ${shortDateLabel(hottest.cell.date)} at ${formatTemp(hottest.cell.highTemp)}.` });

      function WeatherApp() {
        const USE_CURRENT_LOCATION_KEY = "weatherhop-use-current-location";
        const CURRENT_LOCATION_CACHE_KEY = "weatherhop-current-location-cache";
        const CURRENT_LOCATION_CACHE_MS = 6 * 60 * 60 * 1000;
        const ACCOUNT_PROMPT_SEEN_KEY = "weatherhop-account-prompt-seen";

        // Favorites state (persistent)
        const [favorites, setFavorites] = useState([]);
        const [defaultZip, setDefaultZip] = useState(null);
        const [favoritesLoaded, setFavoritesLoaded] = useState(false);
        const [showManage, setShowManage] = useState(false);
        const [useCurrentLocationDefault, setUseCurrentLocationDefault] = useState(
          () => localStorage.getItem(USE_CURRENT_LOCATION_KEY) === "true"
	        );
	        const [locationStatus, setLocationStatus] = useState("");
	        const [requestingLocation, setRequestingLocation] = useState(false);
	        const [showRadar, setShowRadar] = useState(false);
	        const [activeView, setActiveView] = useState("weather");
	        const [authSession, setAuthSession] = useState(null);
	        const [authReady, setAuthReady] = useState(false);
	        const [showAccount, setShowAccount] = useState(false);
	        const [showAccountPrompt, setShowAccountPrompt] = useState(false);
	        const [authEmail, setAuthEmail] = useState("");
	        const [authPassword, setAuthPassword] = useState("");
	        const [authMode, setAuthMode] = useState("signin");
	        const [authMessage, setAuthMessage] = useState("");
	        const [cloudStatus, setCloudStatus] = useState("");
	        const [cloudTrips, setCloudTrips] = useState(null);
	        const [cloudTripsLoaded, setCloudTripsLoaded] = useState(false);
	        const [cloudDataReady, setCloudDataReady] = useState(false);
	        const [cloudSaveTimer, setCloudSaveTimer] = useState(null);
	        const cloudTripsRef = useRef(null);
	        const cloudFavoritesRef = useRef(null);
	        const currentUserId = authSession?.user?.id ?? null;
	        const tripScope = currentUserId ? `user-${currentUserId}` : "local";

        // Favorites selection (kept)
        const [zip, setZip] = useState(null);

        const zipLabels = useMemo(() => Object.fromEntries(favorites.map((f) => [f.zip || "", f.label])), [favorites]);

        // Load favorites from localStorage
        useEffect(() => {
          const saved = localStorage.getItem('weatherhop-favorites');
          if (saved) {
            try {
              const data = JSON.parse(saved);
              setFavorites(data.favorites || []);
              setDefaultZip(data.defaultZip || null);
            } catch (e) {
              console.warn('Failed to load favorites', e);
            }
          } else {
            setFavorites([]);
            setDefaultZip(null);
          }
          setFavoritesLoaded(true);
        }, []);

        // Save favorites to localStorage
        useEffect(() => {
          if (favoritesLoaded) {
            localStorage.setItem('weatherhop-favorites', JSON.stringify({ favorites, defaultZip }));
          }
        }, [favorites, defaultZip, favoritesLoaded]);

        useEffect(() => {
          if (!supabaseClient) {
            setAuthReady(true);
            return;
          }

          let mounted = true;
          supabaseClient.auth.getSession().then(({ data }) => {
            if (!mounted) return;
            setAuthSession(data?.session ?? null);
            setAuthReady(true);
          });

          const { data: listener } = supabaseClient.auth.onAuthStateChange((_event, session) => {
            setAuthSession(session ?? null);
            setAuthReady(true);
          });

          return () => {
            mounted = false;
            listener?.subscription?.unsubscribe?.();
          };
        }, []);

        async function loadCloudFavoritesAndSettings(userId) {
          if (!supabaseClient || !userId) return;
          setCloudStatus("Loading account data...");
          const [{ data: favoriteRows, error: favError }, { data: settingsRow, error: settingsError }] = await Promise.all([
            supabaseClient.from("favorites").select("*").eq("user_id", userId).order("updated_at", { ascending: false }),
            supabaseClient.from("user_settings").select("*").eq("user_id", userId).maybeSingle(),
          ]);
          if (favError) throw favError;
          if (settingsError) throw settingsError;

          const cloudFavorites = (favoriteRows ?? []).map(cloudFavoriteToLocal);
          const localFavorites = favoritesLoaded ? favorites : [];
          const shouldUploadLocal = localFavorites.length && !cloudFavorites.length;
          if (shouldUploadLocal) {
            await saveCloudFavoritesAndSettings(userId, localFavorites, {
              defaultZip,
              useCurrentLocationDefault,
            });
            setFavorites(localFavorites.map(normalizeFavorite));
            cloudFavoritesRef.current = JSON.stringify({ favorites: localFavorites.map(normalizeFavorite), defaultZip, useCurrentLocationDefault });
          } else {
            setFavorites(cloudFavorites);
            setDefaultZip(settingsRow?.default_zip ?? null);
            setUseCurrentLocationDefault(!!settingsRow?.use_current_location_default);
            cloudFavoritesRef.current = JSON.stringify({
              favorites: cloudFavorites.map(normalizeFavorite),
              defaultZip: settingsRow?.default_zip ?? null,
              useCurrentLocationDefault: !!settingsRow?.use_current_location_default,
            });
            if (settingsRow?.use_current_location_default) localStorage.setItem(USE_CURRENT_LOCATION_KEY, "true");
            else localStorage.removeItem(USE_CURRENT_LOCATION_KEY);
          }
        }

        async function saveCloudFavoritesAndSettings(userId, nextFavorites, settings = {}) {
          if (!supabaseClient || !userId) return;
          const normalizedFavorites = (nextFavorites ?? [])
            .map(normalizeFavorite)
            .filter((fav) => (fav.mode === "zip" && !!fav.zip) || (fav.mode === "geo" && Number.isFinite(Number(fav.lat)) && Number.isFinite(Number(fav.lon))));
          const rows = normalizedFavorites.map((fav) => localFavoriteToCloud(fav, userId));
          const clientIds = rows.map((row) => row.client_id);

          if (rows.length) {
            const { error } = await supabaseClient
              .from("favorites")
              .upsert(rows, { onConflict: "user_id,client_id" });
            if (error) throw error;
          }

          const { error: deleteError } = clientIds.length
            ? await supabaseClient.from("favorites").delete().eq("user_id", userId).not("client_id", "in", postgrestTextInList(clientIds))
            : await supabaseClient.from("favorites").delete().eq("user_id", userId);
          if (deleteError) throw deleteError;

          const { error: settingsError } = await supabaseClient.from("user_settings").upsert(

        async function loadCloudTrips(userId) {
          if (!supabaseClient || !userId) return;
          const [{ data: tripRows, error: tripError }, { data: stopRows, error: stopError }] = await Promise.all([
            supabaseClient.from("trips").select("*").eq("user_id", userId).order("updated_at", { ascending: false }),
            supabaseClient.from("trip_stops").select("*").eq("user_id", userId).order("stop_order", { ascending: true }),
          ]);
          if (tripError) throw tripError;
          if (stopError) throw stopError;

          const localTrips = loadTrips("local");
          if (localTrips.length && !(tripRows ?? []).length) {
            await saveCloudTrips(userId, localTrips);
            const refreshedTrips = await fetchCloudTrips(userId);
            setCloudTrips(refreshedTrips);
            cloudTripsRef.current = JSON.stringify(refreshedTrips);
            return;
          }

          const nextTrips = (tripRows ?? []).map((row) => cloudTripToLocal(row, stopRows ?? []));
          setCloudTrips(nextTrips);
          cloudTripsRef.current = JSON.stringify(nextTrips);
        }

        async function fetchCloudTrips(userId) {
          const [{ data: tripRows, error: tripError }, { data: stopRows, error: stopError }] = await Promise.all([
            supabaseClient.from("trips").select("*").eq("user_id", userId).order("updated_at", { ascending: false }),
            supabaseClient.from("trip_stops").select("*").eq("user_id", userId).order("stop_order", { ascending: true }),
          ]);
          if (tripError) throw tripError;
          if (stopError) throw stopError;
          return (tripRows ?? []).map((row) => cloudTripToLocal(row, stopRows ?? []));
        }

        async function saveCloudTrips(userId, nextTrips) {
          if (!supabaseClient || !userId) return;
          const normalizedTrips = (nextTrips ?? []).map(normalizeTrip);
          const tripRows = normalizedTrips.map((trip) => localTripToCloud(trip, userId));
          const tripClientIds = tripRows.map((row) => row.client_id);

          let savedTripRows = [];
          if (tripRows.length) {
            const { data, error } = await supabaseClient
              .from("trips")
              .upsert(tripRows, { onConflict: "user_id,client_id" })
              .select("id, client_id");
            if (error) throw error;
            savedTripRows = data ?? [];
          }

          const { error: tripDeleteError } = tripClientIds.length
            ? await supabaseClient.from("trips").delete().eq("user_id", userId).not("client_id", "in", postgrestTextInList(tripClientIds))
            : await supabaseClient.from("trips").delete().eq("user_id", userId);
          if (tripDeleteError) throw tripDeleteError;

          const tripRowByClientId = Object.fromEntries(savedTripRows.map((row) => [row.client_id, row]));
          const stopRows = normalizedTrips.flatMap((trip) => {
            const tripRow = tripRowByClientId[trip.id];
            if (!tripRow) return [];
            return (trip.locations ?? [])
              .filter((location) => Number.isFinite(Number(location.latitude)) && Number.isFinite(Number(location.longitude)))
              .map((location, idx) => localStopToCloud(location, tripRow, userId, idx));
          });
          const stopClientIds = stopRows.map((row) => row.client_id);

          if (stopRows.length) {
            const { error } = await supabaseClient
              .from("trip_stops")
              .upsert(stopRows, { onConflict: "user_id,client_id" });
            if (error) throw error;
          }

          const { error: stopDeleteError } = stopClientIds.length
            ? await supabaseClient.from("trip_stops").delete().eq("user_id", userId).not("client_id", "in", postgrestTextInList(stopClientIds))
            : await supabaseClient.from("trip_stops").delete().eq("user_id", userId);
          if (stopDeleteError) throw stopDeleteError;
        }

        async function fetchNwsDailyHighs({ lat, lon }) {

              headers: { accept: "application/geo+json" },
            });
            if (!pointRes.ok) return null;
            const pointJson = await readJsonResponse(pointRes, "NWS point lookup");
            const forecastUrl = pointJson?.properties?.forecast;
            if (!forecastUrl) return null;

            const forecastRes = await fetch(forecastUrl, {
              headers: { accept: "application/geo+json" },
            });
            if (!forecastRes.ok) return null;
            const forecastJson = await readJsonResponse(forecastRes, "NWS forecast");
            const highsByDate = {};

            (forecastJson?.properties?.periods ?? []).forEach((period) => {
              if (!period?.isDaytime || !period?.startTime) return;
              const temp = Number(period.temperature);
              if (!Number.isFinite(temp)) return;
              highsByDate[String(period.startTime).slice(0, 10)] = temp;
            });

            return highsByDate;
          } catch (e) {
            console.warn("NWS forecast cross-check failed", e);
            return null;
          }
        }

        async function fetchOpenMeteoDailyHighsByModel({ lat, lon, model }) {

        function median(values) {
          const nums = values.map(Number).filter((value) => Number.isFinite(value)).sort((a, b) => a - b);
          if (!nums.length) return null;
          const mid = Math.floor(nums.length / 2);
          return nums.length % 2 ? nums[mid] : (nums[mid - 1] + nums[mid]) / 2;
        }

        function applyDailyHighConsensusGuard(weather, highChecksBySource) {
          const dates = weather?.daily?.time ?? [];
          const highs = weather?.daily?.temperature_2m_max ?? [];
          if (!dates.length || !highs.length || !highChecksBySource?.length) return weather;

          const adjustedHighs = [...highs];
          const highSources = Array(dates.length).fill("");
          const adjustments = [];

          dates.forEach((date, idx) => {
            const openMeteoHigh = Number(highs[idx]);
            if (!Number.isFinite(openMeteoHigh)) return;

            const checkedHighs = highChecksBySource
              .map(({ source, highsByDate }) => ({
                source,
                high: Number(highsByDate?.[date]),
              }))
              .filter(({ high }) => Number.isFinite(high));
            if (!checkedHighs.length) return;

            const consensusHigh = median(checkedHighs.map(({ high }) => high));
            if (!Number.isFinite(consensusHigh)) return;

            const isHotDay = openMeteoHigh >= 95 || consensusHigh >= 95;
            const rawDifference = Math.abs(openMeteoHigh - consensusHigh);
            const displayedDifference = Math.abs(Math.round(openMeteoHigh) - Math.round(consensusHigh));
            const isHighOutlier = openMeteoHigh >= 105 && openMeteoHigh > consensusHigh && rawDifference >= 2.5;
            const isMeaningfulDifference = rawDifference >= 4 || displayedDifference >= 4 || isHighOutlier;
            if (!isHotDay || !isMeaningfulDifference) return;

            adjustedHighs[idx] = consensusHigh;
            highSources[idx] = "NWS+";
            adjustments.push({
              date,
              openMeteoHigh,
              consensusHigh,
              checkedHighs,
            });
          });

          if (!adjustments.length) return weather;

          return {
            ...weather,
            daily: {
              ...weather.daily,
              temperature_2m_max: adjustedHighs,
              weatherhop_temperature_2m_max_source: highSources,
            },
            weatherhopQuality: {
              ...(weather.weatherhopQuality ?? {}),
              dailyHighConsensusAdjustments: adjustments,
            },
          };
        }

        async function fetchOpenMeteo({ lat, lon }) {
          const params = new URLSearchParams({

            precipitation_unit: "inch",
            wind_speed_unit: "mph",

            hourly: "temperature_2m,relative_humidity_2m,dew_point_2m,cloud_cover,precipitation_probability,wind_speed_10m,weathercode",
            current: "temperature_2m,relative_humidity_2m,wind_speed_10m",
          });

          const [weather, nwsHighsByDate, ecmwfHighsByDate, gemHighsByDate] = await Promise.all([
            fetchWeatherForecast(params, "Weather forecast"),
            fetchNwsDailyHighs({ lat, lon }),
            fetchOpenMeteoDailyHighsByModel({ lat, lon, model: "ecmwf_ifs025" }),
            fetchOpenMeteoDailyHighsByModel({ lat, lon, model: "gem_seamless" }),
          ]);

          return applyDailyHighConsensusGuard(weather, [
            { source: "NWS", highsByDate: nwsHighsByDate },
            { source: "ECMWF", highsByDate: ecmwfHighsByDate },
            { source: "GEM", highsByDate: gemHighsByDate },

        }

        async function fetchAllForLocation(loc) {
          const requestId = weatherRequestRef.current + 1;
          weatherRequestRef.current = requestId;

          if (!loc) {
            setLoading(false);
            return;
          }
          setLoading(true);
          try {
            let lat, lon, city, state, zipForPlace;

            if (loc.mode === "zip") {
              const z = loc.zip;
              const out = await lookupZipToCoords(z);
              lat = out.lat;
              lon = out.lon;
              city = out.city;
              state = out.state;
              zipForPlace = z;
            } else {
              lat = Number(loc.lat);
              lon = Number(loc.lon);
              city = loc.city ?? null;
              state = loc.state ?? null;
              zipForPlace = null;
              if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("Search location had invalid coordinates.");
            }

            const label = loc.label ?? (loc.mode === "zip" ? zipLabels[loc.zip] ?? loc.zip : "Search");
            if (weatherRequestRef.current !== requestId) return;

            setPlace({
              zip: zipForPlace ?? "",
              city: city ?? "—",
              state: state ?? "",
              lat,
              lon,
              label,
              mode: loc.mode,
            });

            refreshOutdoorHealth({ lat, lon });

            const wx = await fetchOpenMeteo({ lat, lon });
            if (weatherRequestRef.current !== requestId) return;

            setError("");
            setData(wx);
            setLastUpdated(new Date());

            const tz = wx?.timezone ?? "auto";
            const offset = Number(wx?.utc_offset_seconds ?? 0);
            const safeOffset = Number.isFinite(offset) ? offset : 0;
            setTzName(tz);
            setUtcOffsetSeconds(safeOffset);

            const firstDay = wx?.daily?.time?.[0] ?? null;
            setSelectedDate(firstDay);

            const sunrise0 = wx?.daily?.sunrise?.[0] ?? null;
            const sunset0 = wx?.daily?.sunset?.[0] ?? null;
            setBgMode(
              computeBgMode({
                nowUtcMillis: Date.now(),
                sunriseLocalIso: sunrise0,
                sunsetLocalIso: sunset0,
                utcOffsetSeconds: safeOffset,
              })
            );

            try {
              setMoon(moonInfoAtUtc(new Date()));
            } catch {
              setMoon(null);
            }

            try {
              if (firstDay) {
                setPlanets10pm(
                  computeVisiblePlanetsAt10pmLocal({
                    lat,
                    lon,
                    utcOffsetSeconds: safeOffset,
                    dateISO: firstDay,
                    tzName: tz,
                  })
                );
              } else {
                setPlanets10pm(null);
              }
            } catch (e) {
              console.warn("Planets calc failed", e);
              setPlanets10pm({
                localLabel: firstDay ? `${formatDateLabel(firstDay)}` : "",
                visible: [],
                error: "Planets calculation failed.",
              });
            }

            try {
              if (firstDay) {
                setMoonRiseSet(
                  computeMoonRiseSetForDate({
                    lat,
                    lon,
                    utcOffsetSeconds: safeOffset,
                    dateISO: firstDay,
                    tzName: tz,
                  }) ?? { rise: "—", set: "—" }
                );
              } else {
                setMoonRiseSet({ rise: "—", set: "—" });
              }
            } catch {
              setMoonRiseSet({ rise: "—", set: "—" });
            }
          } catch (e) {
            if (weatherRequestRef.current !== requestId) return;
            console.error(e);
            setError(e?.message ?? "Something went wrong.");
          } finally {
            if (weatherRequestRef.current === requestId) setLoading(false);
          }
        }

        function fallbackToSavedLocation() {
          const defaultFavorite = defaultZip ? favorites.find((f) => f.mode === "zip" && f.zip === defaultZip) : null;
          const firstFavorite = favorites.find((f) => f?.mode === "zip" || f?.mode === "geo") ?? null;
          const fav = defaultFavorite ?? firstFavorite;

          if (!fav) {
            setActiveLocation(null);
            setZip(null);
            setLoading(false);
            return;
          }

          if (fav.mode === "zip") {
            setZip(fav.zip);
            setActiveLocation({
              mode: "zip",
              zip: fav.zip,
              label: fav.label || fav.zip,
              lat: null,
              lon: null,
              city: null,
              state: null,
            });
            return;
          }

          setZip(null);
          setActiveLocation({
            mode: "geo",
            zip: "",
            label: fav.label || favoriteDisplayLabel(fav),
            lat: fav.lat,
            lon: fav.lon,
            city: fav.city || null,
            state: fav.state || null,
          });
        }

        function readCachedCurrentLocation() {
          try {
            const cached = JSON.parse(localStorage.getItem(CURRENT_LOCATION_CACHE_KEY) || "null");
            if (!cached?.location || !cached?.savedAt) return null;
            if (Date.now() - Number(cached.savedAt) > CURRENT_LOCATION_CACHE_MS) return null;
            const lat = Number(cached.location.lat);
            const lon = Number(cached.location.lon);
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            return {
              ...cached.location,
              lat,
              lon,
              source: "current",
              mode: "geo",
            };
          } catch (e) {
            console.warn("Failed to read cached current location", e);
            return null;
          }
        }

        function saveCachedCurrentLocation(location) {
          try {
            localStorage.setItem(CURRENT_LOCATION_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), location }));
          } catch (e) {
            console.warn("Failed to save cached current location", e);
          }
        }

        function useBrowserLocation({ persist = true, fallback = false, useCached = false } = {}) {
          if (useCached) {
            const cachedLocation = readCachedCurrentLocation();
            if (cachedLocation) {
              setZip(null);
              setActiveLocation(cachedLocation);
              setLocationStatus("Using recent current location.");
              setRequestingLocation(false);
              return;
            }
          }

          if (!navigator.geolocation) {
            setLocationStatus("Location is not available in this browser.");
            if (fallback) fallbackToSavedLocation();
            return;
          }

          setRequestingLocation(true);
          setLocationStatus("Finding your location...");

          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const lat = position.coords.latitude;
              const lon = position.coords.longitude;
              const locationName = await reverseGeocodeCurrentLocation({ lat, lon });
              const cityLabel = locationName.city || "Current Location";
              const nextLocation = {
                mode: "geo",
                source: "current",
                zip: "",
                label: cityLabel,
                lat,
                lon,
                city: cityLabel,
                state: locationName.state || "",
              };

              saveCachedCurrentLocation(nextLocation);

              if (persist) {
                localStorage.setItem(USE_CURRENT_LOCATION_KEY, "true");
                setUseCurrentLocationDefault(true);
              }

              setZip(null);
              setActiveLocation(nextLocation);
              setLocationStatus("Using current location.");
              setRequestingLocation(false);
            },
            (error) => {
              console.warn("Location permission denied or unavailable:", error);
              if (persist) {
                localStorage.removeItem(USE_CURRENT_LOCATION_KEY);
                setUseCurrentLocationDefault(false);
              }
              setLocationStatus("Current location is unavailable.");
              setRequestingLocation(false);
              if (fallback) fallbackToSavedLocation();
              else setLoading(false);
            },
            {
              enableHighAccuracy: false,
              timeout: 8000,
              maximumAge: 10 * 60 * 1000,
            }
          );
        }

        // ---------- Search (Open-Meteo Geocoding) ----------
        async function runSearch(query) {
          const q = String(query ?? "").trim();
          if (!q) {
            setSearchResults([]);
            setSearchLoading(false);
            return;
          }

          // Always allow a "Use ZIP" action if 5 digits
          const zipCandidate = isLikelyZip(q) ? [{ _type: "zip", zip: q }] : [];

          // For pure zip, we can skip geocoding call (fast + reliable via Zippopotam)
          if (isLikelyZip(q)) {
            setSearchResults(zipCandidate);
            setSearchLoading(false);
            return;
          }

          try {
            setSearchLoading(true);
            const params = new URLSearchParams({
              name: q,
              count: "8",
              language: "en",
              format: "json",
            });
            const res = await fetch(`${GEO_API}?${params.toString()}`);
            if (!res.ok) throw new Error(`Geocoding failed (${res.status}).`);
            const json = await readJsonResponse(res, "Location search");
            const results = (json?.results ?? []).map((r) => ({
              _type: "geo",
              id: r.id,
              name: r.name,
              admin1: r.admin1,
              country_code: r.country_code,
              latitude: r.latitude,
              longitude: r.longitude,
            }));

            setSearchResults([...zipCandidate, ...results]);
          } catch (e) {
            console.warn("Search error:", e);
            setSearchResults(zipCandidate);
          } finally {
            setSearchLoading(false);
          }
        }

        async function applySearchPick(pick) {
          if (!pick) return;

          if (pick._type === "zip") {

            if (!isLikelyZip(z)) return;

            // Set favorites dropdown + active location to that zip

            setActiveLocation({
              mode: "zip",
              zip: z,
              label: zipLabels[z] ?? z,
              lat: null,
              lon: null,
              city: null,
              state: null,

            return;

            setActiveLocation({
              mode: "geo",
              zip: "",
              label,
              lat: Number(pick.latitude),
              lon: Number(pick.longitude),
              city: pick.name ?? null,
              state: pick.admin1 ?? null,

            setSearchText(label);
            setSearchOpen(false);
            return;

        // Debounced search

        useEffect(() => {

        useEffect(() => {

        const derived = useMemo(() => {

          };
          if (selectedDate && times.length && temps.length) {

            hourlyForDay = {

              precipValues: idxs.map((i) => (Number.isFinite(Number(precipProbAll[i])) ? Number(precipProbAll[i]) : null)),
              windValues: idxs.map((i) => (Number.isFinite(Number(windAll[i])) ? Number(windAll[i]) : null)),
            };
          }

          const selectedDayData = tenDay.find((d) => d.date === selectedDate) ?? tenDay[0] ?? null;
          const sunriseUtc = localIsoToUtcMillis(selectedDayData?.sunrise, data?.utc_offset_seconds ?? 0);

          const daylightDuration =

              ? sunsetUtc - sunriseUtc
